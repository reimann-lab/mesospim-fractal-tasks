site_name: MesoSPIM Fractal Tasks
site_description: Tasks for converting mesoSPIM lightsheet image data to OME-Zarr and performing illumination correction & stitching
site_author: Giliane Rochat
repo_url: https://github.com/girochat/mesospim-fractal-tasks
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.annotate
  palette:

    # Palette toggle for light mode
    - scheme: default 
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: light blue
      accent: indigo

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
      primary: indigo
      accent: light blue
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - General Info: usage/index.md
      - Running Tasks in Fractal: usage/fractal_integration.md
      - Running Tasks Locally: usage/local_run.md
  - Task Reference:
      - MesoSPIM to OME-Zarr Conversion: tasks/mesospim_to_omezarr.md
      - Flatfield Correction: tasks/correct_flatfield.md
      - Illumination Correction: tasks/correct_illumination.md
      - Stitching: tasks/stitch_with_multiview_stitcher.md
      - ROI Cropping: tasks/crop_regions_of_interest.md
      - Modify OME-Zarr Structure : tasks/modify_omezarr_structure.md
  - API: api.md

  #- Contributing: contributing.md
  #- Changelog: changelog.md

plugins:
  - search
  #- offline
  #- print-site:
  #    add_table_of_contents: true
  #    toc_depth: 3
  #    toc_title: "Index"
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google